services:
  jupyter:
    build: .
    ports:
      - "8888:8888"
    volumes:
      - .:/app
    restart: unless-stopped

  streamlit:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    command: streamlit run app/dashboard.py --server.port=8501 --server.address=0.0.0.0
    restart: unless-stopped
